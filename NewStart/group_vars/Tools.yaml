---

hostname: tools
tailscale_ip: 100.108.212.65  # fill in after first Tailscale provisioning

#######################
# Docker
#######################

docker:
  docker_dir: "/docker"
  domain: dev.autostack.ovh
  cert_resolver: "ovh"
  docker_networks:
    - proxy_network
  composes:
    - name: traefik
      compose: network.yaml
      volumes:
        - letsencrypt
      config:
        - file: traefik.yaml
          dst: letsencrypt/traefik.yaml
        - file: peers.yaml.j2
          dst: letsencrypt/peers.yaml
    - name: urbackup-client
      compose: slave-containers.yaml

#######################
# Backup (UrBackup)
#######################

traefik_peers:
  - "{{ hostvars[groups['Master'][0]].tailscale_ip }}"

urbackup:
  server_host: "{{ hostvars[groups['Master'][0]].services_ip }}"
  backup_dirs: # Directories backed up by the client on each node
    - "{{ docker.docker_dir }}/volumes"
  authkey: "{{ urbackup_authkeys.tools }}" 
