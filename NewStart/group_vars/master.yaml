---

hostname: master
tailscale_ip: 100.118.178.83 # fill in after first Tailscale provisioning

uid: 1000
gid: 1002

#######################
# Docker
#######################

docker:
  docker_dir: "/docker"
  domain: dev.autostack.ovh
  cert_resolver: "ovh"
  puid: 1000
  pgid: 1000
  docker_networks:
    - proxy_network
  composes:
    - name: traefik
      compose: network.yaml
      volumes:
        - letsencrypt
      config:
        - file: traefik.yaml
          dst: letsencrypt/traefik.yaml
        - file: peers.yaml.j2
          dst: letsencrypt/peers.yaml
    - name: monitoring
      compose: monitoring.yaml
      volumes:
        - monitoring/prometheus
        - monitoring/prometheus_data
        - loki
      config:
        - file: prometheus.yaml.j2
          dst: monitoring/prometheus/prometheus.yml
        - file: loki.yaml
          dst: loki/local-config.yaml
    - name: backup
      compose: backup.yaml
      volumes:
        - urbackup/db
        - zerobyte

master_ip: "{{ services_ip }}"

traefik_peers:
  - "{{ hostvars[groups['Media'][0]].tailscale_ip }}"

#######################
# Monitoring
#######################

# Bind node_exporter to all interfaces so Prometheus (Docker) can reach it
node_exporter_listen_address: ""

#######################
# Backup (UrBackup)
#######################

urbackup:
  server_host: urbackup
  backup_dirs:
    - "{{ docker.docker_dir }}/volumes"
  authkey: "{{ urbackup_authkeys.master }}" 

