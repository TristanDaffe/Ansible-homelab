services:

  urbackup-client:
    image: uroni/urbackup-client:latest
    restart: always
    environment:
      - TZ={{ timezone }}
      - URBACKUP_SERVER_NAME={{ urbackup.server_host }}
      - URBACKUP_CLIENT_NAME={{ ansible_hostname }}
      - URBACKUP_CLIENT_AUTHKEY={{ urbackup.authkey }}
    volumes:
      - "{{ docker.docker_dir }}:/backup"
    command:
      - --internet-only
      - -r
      - server-confirms

  portainer-agent:
    image: portainer/agent:latest
    restart: unless-stopped
    environment:
      - TZ={{ timezone }}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "{{ services_ip }}:9001:9001"

  whoami:
    image: "traefik/whoami"
    restart: always
    hostname: "{{ ansible_hostname }}"
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
      - "traefik.http.routers.whoami.rule=Host(`whoami.{{ ansible_hostname }}.{{ docker.domain }}`)"
      - "traefik.http.routers.whoami.entrypoints=web,websecure"

networks:
  proxy_network:
    external: true