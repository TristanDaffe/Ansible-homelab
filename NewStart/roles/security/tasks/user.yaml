---
- name: Create groups
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop:
    - admin
    - docker
    - sudo

- name: Ensure primary group exists
  ansible.builtin.group:
    name: "{{ username }}"
    state: present

- name: Create user account
  ansible.builtin.user:
    name: "{{ username }}"
    groups: "{{ username }},{{ ssh_group }},{{ sudo_group }},docker,sudo"
    shell: /bin/bash
    create_home: yes
    state: present

- name: Add SSH public key for user
  ansible.builtin.authorized_key:
    user: "{{ username }}"
    key: "{{ lookup('file', ssh_public_key_file) }}"
    state: present

- name: Allow '{{ sudo_group }}' group to have passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    state: present
    regexp: '^%{{ sudo_group }}'
    line: '%{{ sudo_group }} ALL=(ALL) NOPASSWD: ALL'
    validate: '/usr/sbin/visudo -cf %s'

- name: Ensure password authentication is disabled
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  notify: Restart SSH

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
  notify: Restart SSH

- name: Restrict SSH access to '{{ ssh_group }}' group
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?AllowGroups'
    line: 'AllowGroups {{ ssh_group }}'
  notify: Restart SSH
