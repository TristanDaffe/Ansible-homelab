#                    groups['Gluster'] | map('extract', hostvars, 'target_ip') | list | first + 
#                    groups['Gluster'] | map('extract', hostvars, 'target_ip') | list | difference([ host_name ]) | join(',') }}"

- name: Debug 
  debug:
    msg: "{{ 
        groups['Gluster'] | map('extract', hostvars, 'target_ip') | list | unique | difference([ host_name ]) | join(',')
      }}"

- name: Enable the plugin
  community.docker.docker_plugin:
    plugin_name: glusterfs
    state: enable