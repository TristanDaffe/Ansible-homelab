---
- name: Join cluster as worker
  ansible.builtin.command:
    argv:
      - docker
      - swarm
      - join
      - --token
      - "{{ worker_token }}"
      - "{{ hostvars[groups['Leader']].ansible_host }}:2377"  
  when:
  - "not is_in_swarm"
  changed_when: true

- name: Demote manager to worker
  shell: "docker node demote $(docker info --format '{{ \"{{.Swarm.NodeID}}\" }}')"
  when:
    - "'Workers' in group_names"
    - "is_manager" 

