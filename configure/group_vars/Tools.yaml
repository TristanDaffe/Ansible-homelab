---

hostname: tools
tailscale_ip: 100.66.54.114 # fill in after first Tailscale provisioning
mount_nas: false

#######################
# NAS
#######################

nas:
  puid: 1000
  pgid: 1000
  mount: /media

#######################
# Docker
#######################

docker:
  docker_dir: "/docker"
  domain: autostack.ovh
  subdomain: "tools"
  cert_resolver: "ovh"
  puid: 1000
  pgid: 1000
  docker_networks:
    - proxy_network
  composes:
    - name: traefik
      compose: network.yaml
      volumes:
        - letsencrypt
      config:
        - file: traefik.yaml
          dst: letsencrypt/traefik.yaml
        - file: peers.yaml.j2
          dst: letsencrypt/peers.yaml
    - name: slaves
      compose: slave-containers.yaml
    - name: tools
      compose: tools.yaml
      volumes:
        - stirling-data
    - name: media-management
      compose: media-management.yaml
      volumes:
        - shelfmark
        - shelfmark-2
        - prowlarr
        - seer
        - sonarr
        - radarr
        - bazarr
        - qbittorrent

#######################
# Backup (UrBackup)
#######################

traefik_peers:
  - "{{ hostvars[groups['Master'][0]].tailscale_ip }}"
  - "{{ hostvars[groups['Media'][0]].tailscale_ip }}"

urbackup:
  server_host: "{{ hostvars[groups['Master'][0]].services_ip }}"
  backup_dirs: # Directories backed up by the client on each node
    - "{{ docker.docker_dir }}/volumes"
  authkey: "{{ urbackup_authkeys.tools }}" 
