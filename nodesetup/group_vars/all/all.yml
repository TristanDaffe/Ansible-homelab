############
# Proxmox and VM config
############

# Proxmox cluster node name where VMs will be created (e.g., 'pve')
proxmox_node: pve-dev

# Storage name to use for disks and cloud-init (e.g., 'local-lvm')
proxmox_storage: vm-dev

# Bridge to attach VMs to (e.g., 'vmbr0')
proxmox_bridge: vmbr0

# Storage for cloud-init snippets (usually 'local')
proxmox_snippets_storage: local

# Keyboard layout for Proxmox VNC console
keyboard_layout: fr-be

# Keyboard layout for the OS (cloud-init keyboard module — XKB/loadkeys code)
# 'be' = Belgian AZERTY. Different from Proxmox's 'fr-be' VNC code.
cloud_init_keyboard_layout: be

# Ubuntu LTS cloud image URL (24.04 default; change as desired)
ubuntu_lts_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"

# Ubuntu LTS LXC template name (must exist in `pveam available`)
ubuntu_lxc_template: "ubuntu-24.04-standard_24.04-2_amd64.tar.zst"

# Optional LXC features to enable (e.g., ['nesting=1'])
lxc_features:
  - keyctl=1
  - nesting=1

# Optional LXC mount points (mp0, mp1, ...)
# lxc_mounts:
#   mp0: "local-lvm:8,mp=/mnt/data"

# CIFS shares to mount on the Proxmox host
# uid/gid must use the LXC offset (100000 + container uid/gid) for unprivileged containers
cifs_mounts:
  - src: //192.168.129.45/Tristan
    path: /mnt/pve/wd2
    opts: "rw,nobrl,username=guest,password=,uid=101000,gid=101001,file_mode=0775,dir_mode=0775,vers=3.1.1"

# VM definitions
vms:
  - name: master
    vmid: 125
    memory: 12288
    cores: 3
    disk_gb: 128
    ciuser: susu 
    autostart: true
    ipconfig0: ip=192.168.129.125/23,gw=192.168.128.1

# LXC containers (Ubuntu LTS)
lxc_containers:
  - hostname: media
    ctid: 223
    memory: 10240
    cores: 3
    rootfs_gb: 320
    ipconfig: "192.168.129.123/23,gw=192.168.128.1"
    privileged: false
    autostart: true
    features:
      - nesting=1
    enable_tun: true
    enable_igpu: true
    nas_mounts:
      - src: /mnt/pve/wd2/mac-mini
        dst: /media
        mp_index: 1

  - hostname: tools
    ctid: 224
    memory: 8192
    cores: 3
    rootfs_gb: 24
    ipconfig: "192.168.129.124/23,gw=192.168.128.1"
    privileged: false  
    autostart: true
    features:
      - nesting=1
    enable_tun: true
    enable_igpu: false 
    nas_mounts:
      - src: /mnt/pve/wd2/mac-mini
        dst: /media
        mp_index: 1
