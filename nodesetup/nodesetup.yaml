---
- name: Configure Proxmox host and provision VMs and LXC containers
  hosts: proxmox
  become: true
  gather_facts: false

  # ubuntu_cloudimg_filename comes from roles/proxmox-host/defaults (derived
  # from ubuntu_lts_image_url) — no play-level copy needed.
  pre_tasks:
    - name: Resolve local SSH public key for cloud-init
      ansible.builtin.set_fact:
        ssh_public_key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/id_rsa.pub') }}"
      when: ssh_public_key is not defined

  roles:
    - role: proxmox-host
      tags: [proxmox-host]

  tasks:
    - name: Provision each VM
      ansible.builtin.include_role:
        name: proxmox-vm
      loop: "{{ vms | default([]) }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      tags: [proxmox-vm]

    - name: Provision each LXC container
      ansible.builtin.include_role:
        name: proxmox-lxc
      loop: "{{ lxc_containers | default([]) }}"
      loop_control:
        loop_var: ct
        label: "{{ ct.hostname }}"
      tags: [proxmox-lxc]
