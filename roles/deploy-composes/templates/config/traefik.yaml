# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3.json

api:
  dashboard: true
  insecure: false

log:
  level: INFO

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy_network
{% if traefik_peers is defined and traefik_peers | length > 0 %}
  file:
    filename: "/letsencrypt/peers.yaml"
    watch: true
{% endif %}

entryPoints:
  web:
    address: ":80"
  internal:
    address: ":8080"
  websecure:
    address: ":443"
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/8"
        - "172.16.0.0/12"     # Docker bridge
        - "192.168.128.0/23"  # LAN subnet
        - "100.64.0.0/10"     # Tailscale
    transport:
      respondingTimeouts:
        readTimeout: 0
    http:
      tls: 
        certResolver: "{{ docker.cert_resolver }}"
        domains:
          - main: "{{ docker.domain }}"
            sans:
              - "*.{{ docker.domain }}"
{% if docker.subdomain is defined %}
          - main: "*.{{ docker.subdomain }}.{{ docker.domain }}"
{% endif %}
  # tailscale:
  #   address: "{{ services_ip }}:8443"
  #   http:
  #     tls: 
  #       certResolver: "{{ docker.cert_resolver }}"
  #       domains:
  #         - main: "{{ docker.domain }}"
  #           sans:
  #             - "*.{{ docker.domain }}"

certificatesResolvers:
  ovh:
    acme:
      email: "{{ email }}"
      storage: "/letsencrypt/acme.json"
      dnsChallenge:
        provider: ovh
        delayBeforeCheck: "0"
