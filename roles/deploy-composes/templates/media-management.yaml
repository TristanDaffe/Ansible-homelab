services:

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    restart: unless-stopped
    environment:
      FLASK_PORT: 8084
      LOG_LEVEL: info
      BOOK_LANGUAGE: fr,en
      USE_BOOK_TITLE: "true"
      TZ: "{{ timezone }}"
      APP_ENV: prod
      UID: "{{ docker.puid }}"
      GID: "{{ docker.pgid }}"
      CUSTOM_DNS: google
      USE_DOH: "true"
      USE_CF_BYPASS: "true"
      EXT_BYPASSER_URL: http://flaresolverr:8191
      PRIORITIZE_WELIB: "True"
    volumes:
      - "{{ docker.docker_dir }}/volumes/shelfmark:/config"
      - "{{ nas.mount }}/books/downloads:/books"
    networks:
      - proxy_network
      - indexer
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.shelfmark.loadbalancer.server.port=8084"
      - "traefik.http.routers.shelfmark.rule=Host(`shelfmark.{{ docker.domain }}`)"
      - "traefik.http.routers.shelfmark.entrypoints=websecure"

  shelfmark-maman:
    image: ghcr.io/calibrain/shelfmark:latest
    restart: unless-stopped
    environment:
      FLASK_PORT: 8084
      LOG_LEVEL: info
      BOOK_LANGUAGE: fr
      USE_BOOK_TITLE: "true"
      TZ: "{{ timezone }}"
      APP_ENV: prod
      UID: "{{ docker.puid }}"
      GID: "{{ docker.pgid }}"
      CUSTOM_DNS: google
      USE_DOH: "true"
    volumes:
      - "{{ nas.mount }}/books-maman/downloads:/books"
      - "{{ docker.docker_dir }}/volumes/shelfmark-2:/config"
    networks:
      - proxy_network
      - indexer

    labels:
      - "traefik.enable=true"
      - "traefik.http.services.shelfmark-maman.loadbalancer.server.port=8084"
      - "traefik.http.routers.shelfmark-maman.rule=Host(`shelfmark-maman.{{ docker.domain }}`)"
      - "traefik.http.routers.shelfmark-maman.entrypoints=websecure"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    environment:
      - PUID={{ docker.puid }}
      - PGID={{ docker.pgid }}
      - TZ={{ timezone }}
    volumes:
      - "{{ docker.docker_dir }}/volumes/prowlarr/data:/config"
      - "{{ docker.docker_dir }}/volumes/prowlarr/custom:/config/Definitions/Custom"
    networks:
      - proxy_network
      - indexer
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.http.routers.prowlarr.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/prowlarr`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.middlewares=tinyauth-media@file"
      - "traefik.http.routers.prowlarr-api.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/prowlarr/api`)"
      - "traefik.http.routers.prowlarr-api.entrypoints=websecure"
      - "traefik.http.routers.prowlarr-api.service=prowlarr"
      - "traefik.http.routers.prowlarr-api.priority=100"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
    networks:
      - indexer

  seer:
    image: ghcr.io/seerr-team/seerr:latest
    restart: unless-stopped
    volumes:
      - "{{ docker.docker_dir }}/volumes/seer:/app/config"
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.seer.loadbalancer.server.port=5055"
      - "traefik.http.routers.seer.rule=Host(`seer.{{ docker.domain }}`)"
      - "traefik.http.routers.seer.entrypoints=websecure"

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    restart: unless-stopped
    environment:
      - PUID={{ nas.puid }}
      - PGID={{ nas.pgid }}
      - TZ={{ timezone }}
    volumes:
      - "{{ docker.docker_dir }}/volumes/sonarr:/config"
      - "{{ nas.mount }}/media/downloads:/downloads"
      - "{{ nas.mount }}/media/tvseries:/tv"
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.http.routers.sonarr.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/sonarr`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.middlewares=tinyauth-media@file"
      - "traefik.http.routers.sonarr-api.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/sonarr/api`)"
      - "traefik.http.routers.sonarr-api.entrypoints=websecure"
      - "traefik.http.routers.sonarr-api.service=sonarr"
      - "traefik.http.routers.sonarr-api.priority=100"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    environment:
      - PUID={{ nas.puid }}
      - PGID={{ nas.pgid }}
      - TZ={{ timezone }}
    volumes:
      - "{{ docker.docker_dir }}/volumes/radarr:/config"
      - "{{ nas.mount }}/media/downloads:/downloads"
      - "{{ nas.mount }}/media/movies:/movies"
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.http.routers.radarr.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/radarr`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.middlewares=tinyauth-media@file"
      - "traefik.http.routers.radarr-api.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/radarr/api`)"
      - "traefik.http.routers.radarr-api.entrypoints=websecure"
      - "traefik.http.routers.radarr-api.service=radarr"
      - "traefik.http.routers.radarr-api.priority=100"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    restart: unless-stopped
    environment:
      - PUID={{ nas.puid }}
      - PGID={{ nas.pgid }}
      - TZ={{ timezone }}
    volumes:
      - "{{ docker.docker_dir }}/volumes/bazarr:/config"
      - "{{ nas.mount }}/media/movies:/movies"
      - "{{ nas.mount }}/media/tvseries:/tv"
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      - "traefik.http.routers.bazarr.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/bazarr`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.middlewares=tinyauth-media@file"
      - "traefik.http.routers.bazarr-api.rule=Host(`arr.{{ docker.domain }}`) && PathPrefix(`/bazarr/api`)"
      - "traefik.http.routers.bazarr-api.entrypoints=websecure"
      - "traefik.http.routers.bazarr-api.service=bazarr"
      - "traefik.http.routers.bazarr-api.priority=100"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    restart: unless-stopped
    environment:
      - PUID={{ nas.puid }}
      - PGID={{ nas.pgid }}
      - TZ={{ timezone }}
      - WEBUI_PORT=8080
    volumes:
      - "{{ docker.docker_dir }}/volumes/qbittorrent:/config"
      - "{{ nas.mount }}/media/downloads:/downloads"
    ports:
      - 6881:6881
      - 6881:6881/udp
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.qbit.loadbalancer.server.port=8080"
      - "traefik.http.routers.qbit.rule=Host(`qbit.{{ docker.domain }}`)"
      - "traefik.http.routers.qbit.entrypoints=websecure"
      - "traefik.http.routers.qbit.middlewares=tinyauth-media@file"
      - "traefik.http.routers.qbit-api.rule=Host(`qbit.{{ docker.domain }}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.qbit-api.entrypoints=websecure"
      - "traefik.http.routers.qbit-api.service=qbit"
      - "traefik.http.routers.qbit-api.priority=100"

networks:
  proxy_network:
    external: true
  indexer:
