services:

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    ports:
      - 9000:9000
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "{{ docker_dir}}/portainer/data:/data"

  twingate: 
    container_name: "{{ twingate_container_name }}"
    image: twingate/connector:latest
    environment:
      - TWINGATE_NETWORK="{{  twingate_network }}"
      - TWINGATE_ACCESS_TOKEN="{{ twingate_access_token }}"
      - TWINGATE_REFRESH_TOKEN="{{ twingate_refresh_token }}" 
      - TWINGATE_LABEL_HOSTNAME="`hostname`"
    restart: 'unless-stopped'
    sysctls:
      net.ipv4.ping_group_range: "0 2147483647"


  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096
    volumes:
      - "{{ docker_dir}}/jellyfin/config:/config"
      - "{{ docker_dir}}/jellyfin/cache:/cache"
      - "{{ docker_dir}}/media:/media"
    restart: 'unless-stopped'
    devices:
      - "/dev/dri:/dev/dri" 
  
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    volumes:
      - "{{ docker_dir}}/qbit/appdata/config:/config"
      - "{{ docker_dir}}/media/downloads:/downloads"
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - "{{ docker_dir}}/sonarr/data:/config"
      - "{{ docker_dir}}/media/downloads:/downloads"
      - "{{ docker_dir}}/media/tvseries:/tv"
    ports:
      - 8989:8989
    restart: unless-stopped

