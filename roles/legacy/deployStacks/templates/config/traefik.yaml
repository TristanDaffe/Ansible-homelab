# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3.json

api:
  dashboard: true
  insecure: false

log:
  level: INFO

providers:
  swarm:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy_network

entryPoints:
  web:
    address: ":80"
  internal:
    address: ":8080"
  websecure:
    address: ":443"
    http:
      tls: 
        certResolver: "{{ swarm.cert_resolver }}"
        domains:
          - main: "{{ swarm.domain }}"
            sans:
              - "*.{{ swarm.domain }}"

certificatesResolvers:
  # duckdns:
  #   acme:
  #     email: "{{ email }}"
  #     storage: "/letsencrypt/acme.json"
  #     dnsChallenge:
  #       provider: duckdns
  ovh:
    acme:
      email: "{{ email }}"
      storage: "/letsencrypt/acme.json"
      dnsChallenge:
        provider: ovh
        delayBeforeCheck: "0"
