---
- name: Install fail2ban
  ansible.builtin.package:
    name: fail2ban
    state: present

- name: Copy fail2ban local configuration
  ansible.builtin.copy:
    src: fail2ban.local
    dest: /etc/fail2ban/jail.d/ssh-hardening.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart fail2ban

- name: Ensure fail2ban service is enabled
  ansible.builtin.systemd_service:
    name: fail2ban
    state: started
    enabled: true