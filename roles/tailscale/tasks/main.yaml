---
# https://github.com/artis3n/ansible-collection-tailscale/tree/main
- name: Tailscale
  ansible.builtin.include_role:
    name: artis3n.tailscale.machine
  vars:
    tailscale_authkey: "{{ tailscale.authkey }}"
    tailscale_args: "{{ tailscale_up_args }}"

# No default() fallback: if the artis3n fact is missing something is wrong and
# the play must fail here, not propagate a bogus IP into services_ip bindings.
- name: Set Tailscale IP fact
  ansible.builtin.set_fact:
    tailscale_ip: "{{ tailscale_node_ipv4 }}"
